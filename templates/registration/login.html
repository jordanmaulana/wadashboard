{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'output.css' %}" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div class="flex min-h-screen items-center justify-center px-4">
      <div class="w-full max-w-sm rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-xl font-semibold">Sign in</h1>
        <p class="mt-1 text-sm text-slate-600">Admin login.</p>

        {% if form.non_field_errors %}
          <div class="mt-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
            {{ form.non_field_errors }}
          </div>
        {% endif %}

        <form method="post" class="mt-6 flex flex-col gap-4">
          {% csrf_token %}
          <label class="flex flex-col gap-1 text-sm">
            <span class="font-medium text-slate-700">Username</span>
            <input name="username" type="text" autocomplete="username" required
                   class="rounded border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none" />
          </label>
          <label class="flex flex-col gap-1 text-sm">
            <span class="font-medium text-slate-700">Password</span>
            <input name="password" type="password" autocomplete="current-password" required
                   class="rounded border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none" />
          </label>
          <button type="submit"
                  class="rounded bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700">
            Log in
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
